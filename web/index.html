<!doctype html>
<html lang="ja">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seicho</title><link rel="icon" href="/favicon.svg" type="image/svg+xml"><link rel="stylesheet" href="/tokens.css"><link rel="stylesheet" href="/style.css"><link rel="stylesheet" href="/sort.css"><link rel="stylesheet" href="/editor-actions.css"><link rel="stylesheet" href="/version.css"><link rel="stylesheet" href="/modal.css"><link rel="stylesheet" href="/editor-toolbar.css"><link rel="stylesheet" href="/button-theme.css"><link rel="stylesheet" href="/git-panel.css"></head>
<body>
<div id="setup" class="modal hidden"><form id="site-form" class="dialog"><button type="button" id="close-setup" class="modal-close hidden" data-i18n-aria="closeDialog" data-i18n-title="close">×</button><span class="eyebrow">LOCAL CONTENT STUDIO</span><h1 data-i18n="openHugoSite"></h1><p data-i18n="siteHelp"></p><label><span data-i18n="siteFolder"></span><input id="site-path" required placeholder="/path/to/hugo-site"></label><button class="primary" data-i18n="openSite"></button><output id="setup-error"></output></form></div>
<div id="new-post-modal" class="modal hidden"><form id="new-post-form" class="dialog new-post-dialog"><button type="button" id="close-new-post" class="modal-close" data-i18n-aria="closeDialog" data-i18n-title="close">×</button><span class="eyebrow">NEW CONTENT</span><h1 data-i18n="newPost"></h1><p data-i18n="newPostHelp"></p><label><span data-i18n="postPath"></span><input id="new-post-path" required autocomplete="off" spellcheck="false" placeholder="posts/new-post.md"></label><div class="dialog-actions"><button type="button" id="cancel-new-post" class="secondary" data-i18n="cancel"></button><button type="submit" class="primary" data-i18n="createPost"></button></div><output id="new-post-error"></output></form></div>
<div id="delete-post-modal" class="modal hidden"><form id="delete-post-form" class="dialog delete-post-dialog"><button type="button" id="close-delete-post" class="modal-close" data-i18n-aria="closeDialog" data-i18n-title="close">×</button><span class="eyebrow danger-eyebrow">DELETE CONTENT</span><h1 data-i18n="deleteQuestion"></h1><p data-i18n="deleteHelp"></p><div id="delete-post-path" class="delete-target"></div><div class="dialog-actions"><button type="button" id="cancel-delete-post" class="secondary" data-i18n="cancel"></button><button type="submit" class="destructive" data-i18n="deletePost"></button></div><output id="delete-post-error"></output></form></div>
<div id="discard-modal" class="modal hidden"><form id="discard-form" class="dialog discard-dialog"><button type="button" id="close-discard" class="modal-close" data-i18n-aria="closeDialog" data-i18n-title="close">×</button><span class="eyebrow warning-eyebrow">UNSAVED CHANGES</span><h1 data-i18n="unsavedChanges"></h1><p data-i18n="unsavedHelp"></p><div class="dialog-actions"><button type="submit" class="discard-action" data-i18n="leaveWithoutSaving"></button><button type="button" id="cancel-discard" class="primary" data-i18n="returnToEditing"></button></div></form></div>
<div class="shell">
 <header><div class="brand"><img class="mark" src="/favicon.svg" alt=""><div><strong>Seicho <span id="app-version"></span></strong><small id="site-name"></small></div></div><div class="actions"><label class="language-control"><span data-i18n="language"></span><select id="language" aria-label="Language"><option value="ja">日本語</option><option value="en">English</option></select></label><button id="change-site" class="ghost" data-i18n="changeSite"></button><details id="tools-menu" class="tools-menu"><summary class="ghost" data-i18n-aria="tools" data-i18n-title="tools">…</summary><div class="tools-menu-list"><button type="button" id="git-toggle" aria-expanded="false"><span data-i18n="git"></span><span id="git-count"></span></button></div></details></div></header>
 <aside><div class="aside-title"><label class="sort-control" data-i18n-title="sortPosts"><span aria-hidden="true">⇅</span><select id="sort" data-i18n-aria="sortOrder"><option value="modified-desc" data-i18n="modifiedNewest"></option><option value="modified-asc" data-i18n="modifiedOldest"></option><option value="date-desc" data-i18n="dateNewest"></option></select></label><span>CONTENTS</span><button id="new" data-i18n-title="newPost">＋</button></div><input id="search" type="search" data-i18n-placeholder="searchPosts"><div id="post-list" class="post-list"></div></aside>
 <main id="empty" class="empty"><div><p data-i18n="chooseWritingHelp"></p><button id="empty-new" class="primary" data-i18n="newPost"></button></div></main>
 <main id="editor" class="editor hidden"><div class="editor-toolbar"><div class="editor-toolbar-title"><span>POST EDITOR</span></div><div class="editor-toolbar-actions"><span id="character-count" class="zen-character-count"></span><button id="zen-mode" class="zen-toggle" data-i18n="zenMode"></button><button id="save" class="primary toolbar-save"><span data-i18n="save"></span> <kbd>Ctrl S</kbd></button><button id="delete" class="danger toolbar-delete" data-i18n-title="deleteThisPost"><span data-i18n="delete"></span></button></div></div><div class="meta"><label><span data-i18n="filePath"></span><input id="path" placeholder="posts/my-post.md"></label><label>Front Matter<textarea id="front" spellcheck="false"></textarea></label></div><div class="workspace"><section><div class="pane-title markdown-pane-title">MARKDOWN</div><textarea id="body" data-i18n-placeholder="startWriting"></textarea></section><section class="preview"><div class="pane-title">PREVIEW</div><article id="preview"></article></section></div></main>
</div>
<section id="git-panel" class="git-panel hidden" aria-labelledby="git-panel-title"><div class="git-panel-header"><div><span class="eyebrow">VERSION CONTROL</span><h2 id="git-panel-title" data-i18n="gitPanel"></h2></div><button type="button" id="git-close" class="modal-close" data-i18n-aria="closeGit" data-i18n-title="close">×</button></div><div id="git-repository-state" class="git-repository-state"></div><div id="git-branch" class="git-branch"></div><output id="git-error"></output><div id="git-content"><h3 data-i18n="gitChanges"></h3><div id="git-changes" class="git-changes"></div><h3 data-i18n="gitDiff"></h3><pre id="git-diff" class="git-diff"></pre><div class="git-commit"><label><span data-i18n="gitCommitMessage"></span><textarea id="git-commit-message" rows="3"></textarea></label><button type="button" id="git-commit" class="primary" data-i18n="gitCommit"></button><p id="git-commit-hint" class="git-commit-hint" data-i18n="gitCommitHint"></p><output id="git-feedback"></output></div></div></section>
<div id="toast"></div><script src="/app-utils.js"></script><script src="/router.js"></script><script src="/i18n.js"></script><script src="/editor-view.js"></script><script src="/character-count.js"></script><script src="/git-panel.js"></script><script src="/app.js"></script>
</body></html>
