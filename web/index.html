<!doctype html>
<html lang="ja">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Seicho</title><link rel="stylesheet" href="/style.css"><link rel="stylesheet" href="/sort.css"><link rel="stylesheet" href="/editor-actions.css"></head>
<body>
<div id="setup" class="modal hidden"><form id="site-form" class="dialog"><span class="eyebrow">LOCAL CONTENT STUDIO</span><h1>Hugoサイトを開く</h1><p>サイト設定ファイルがあるフォルダーの絶対パスを入力してください。</p><label>サイトフォルダー<input id="site-path" required placeholder="C:\Sites\my-blog"></label><button>サイトを開く</button><output id="setup-error"></output></form></div>
<div class="shell">
 <header><div class="brand"><span class="mark">S</span><div><strong>Seicho</strong><small id="site-name">サイト未選択</small></div></div><div class="actions"><span id="status"></span><button id="change-site" class="ghost">サイト変更</button><button id="save" class="primary">保存 <kbd>Ctrl S</kbd></button></div></header>
 <aside><div class="aside-title"><span>CONTENTS</span><button id="new" title="新規投稿">＋</button></div><input id="search" type="search" placeholder="投稿を検索…"><select id="sort" aria-label="投稿の並び順"><option value="modified-desc">更新日時が新しい順</option><option value="modified-asc">更新日時が古い順</option><option value="date-desc">公開日が新しい順</option></select><div id="post-list" class="post-list"></div></aside>
 <main id="empty" class="empty"><div><span class="big-mark">S</span><h2>文章を書く場所を選びましょう</h2><p>左の一覧から投稿を選ぶか、新しい投稿を作成してください。</p><button id="empty-new" class="primary">新しい投稿</button></div></main>
 <main id="editor" class="editor hidden"><div class="meta"><label>ファイルパス<input id="path" placeholder="posts/my-post.md"></label><label>Front Matter<textarea id="front" spellcheck="false"></textarea></label><div class="meta-actions"><button id="delete" class="danger">この投稿を削除</button></div></div><div class="workspace"><section><div class="pane-title">MARKDOWN</div><textarea id="body" placeholder="ここから本文を書き始めます…"></textarea></section><section class="preview"><div class="pane-title">PREVIEW</div><article id="preview"></article></section></div></main>
</div><div id="toast"></div><script src="/app.js"></script>
</body></html>
